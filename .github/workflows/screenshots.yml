name: Screenshots

on:
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start app
        run: |
          npm run dev > dev.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          cat dev.log
          exit 1

      - name: Capture landing screenshot
        run: |
          mkdir -p artifacts
          npx playwright screenshot --device="Desktop Chrome" http://127.0.0.1:3000 artifacts/landing-page.png

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: artifacts/*.png
